name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Checkout the private jules-team repository to build the CLI
      - name: Checkout Jules Team CLI
        uses: actions/checkout@v4
        with:
          repository: 'DaviDWCN/jules-team'
          token: ${{ secrets.ORCHESTRATOR_GITHUB_TOKEN }}
          path: 'jules-team-cli'

      # Build and install the CLI locally
      - name: Install jules-team CLI
        run: |
          cd jules-team-cli
          npm install
          npm run build
          npm install -g .

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent and Comment Feedback
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta/openai"
          LLM_MODEL: "gemini-3.5-flash"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Extract Task ID from tasks.md mapping or branch name / PR title
          PR_URL="${{ github.event.pull_request.html_url }}"
          LINE_NUM=$(grep -n "$PR_URL" openspec/tasks.md | cut -d: -f1 | head -n 1)
          if [ -n "$LINE_NUM" ]; then
            TASK_ID=$(head -n "$LINE_NUM" openspec/tasks.md | grep -oE "TASK-[0-9]{3,}" | tail -n 1)
          fi

          if [ -z "$TASK_ID" ]; then
            TASK_ID=$(echo "${{ github.event.pull_request.head.ref }} ${{ github.event.pull_request.title }}" | grep -oE "TASK-[0-9]{3,}" | head -n 1)
          fi

          if [ -z "$TASK_ID" ]; then
            echo "Error: Could not determine Task ID from openspec/tasks.md mapping, branch name '${{ github.event.pull_request.head.ref }}', or PR title '${{ github.event.pull_request.title }}'."
            exit 1
          fi
          echo "Auditing task: $TASK_ID"

          # 2. Audit the PR diff against the spec and coding conventions
          exit_code=0
          jules-team review openspec/tasks.md "$TASK_ID" --diff pr_changes.diff > review_report.md 2>&1 || exit_code=$?
          cat review_report.md

          # 3. Post review comment back to the PR
          if [ -s review_report.md ]; then
            gh pr comment "${{ github.event.pull_request.html_url }}" --body-file review_report.md
          fi

          # 4. Exit with the review's original verdict status (0 = approve, 1 = request changes)
          exit $exit_code
