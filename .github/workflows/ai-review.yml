name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Checkout the private jules-team repository to build the CLI
      - name: Checkout Jules Team CLI
        uses: actions/checkout@v4
        with:
          repository: 'DaviDWCN/jules-team'
          token: ${{ secrets.ORCHESTRATOR_GITHUB_TOKEN }}
          path: 'jules-team-cli'

      # Build and install the CLI locally
      - name: Install jules-team CLI
        run: |
          cd jules-team-cli
          npm install
          npm run build
          npm install -g .

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
          LLM_MODEL: "gemini-flash-latest"
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract TASK_ID from PR title or branch name (e.g., [TASK-008] or fix/TASK-008-bug)
          echo "PR Title: $PR_TITLE"
          echo "Branch Name: $GITHUB_HEAD_REF"

          TASK_ID=$(echo "$PR_TITLE" | grep -oE 'TASK-[0-9]+' | head -n 1)
          if [ -z "$TASK_ID" ]; then
            echo "TASK_ID not found in PR title, checking branch name..."
            TASK_ID=$(echo "$GITHUB_HEAD_REF" | grep -oE 'TASK-[0-9]+' | head -n 1)
          fi

          if [ -z "$TASK_ID" ]; then
            echo "Error: Could not extract TASK_ID from PR title ($PR_TITLE) or branch name ($GITHUB_HEAD_REF)"
            exit 1
          fi
          echo "Detected Task ID: $TASK_ID"

          # Audit the PR diff against the spec and coding conventions
          jules-team review openspec/tasks.md "$TASK_ID" --diff pr_changes.diff
