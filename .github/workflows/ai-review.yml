name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Checkout the private jules-team repository to build the CLI
      - name: Checkout Jules Team CLI
        uses: actions/checkout@v4
        with:
          repository: 'DaviDWCN/jules-team'
          token: ${{ secrets.ORCHESTRATOR_GITHUB_TOKEN }}
          path: 'jules-team-cli'

      # Build and install the CLI locally
      - name: Install jules-team CLI
        run: |
          cd jules-team-cli
          npm install
          npm run build
          npm install -g .

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
          LLM_MODEL: "gemini-3.5-flash"
        run: |
          # Dynamically extract TASK_ID from branch name or PR title
          TASK_ID=$(echo "${{ github.head_ref }}${{ github.event.pull_request.title }}" | grep -oE "TASK-[0-9]+" | head -n 1 || echo "TASK-001")
          echo "Detected TASK_ID: $TASK_ID"
          # Audit the PR diff against the spec and coding conventions
          jules-team review openspec/tasks.md $TASK_ID --diff pr_changes.diff
