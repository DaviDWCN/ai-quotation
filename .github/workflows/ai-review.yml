name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Fetch the latest jules-team CLI to perform the audit
      - name: Install jules-team CLI
        run: |
          npm install -g DaviDWCN/jules-team

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
          LLM_MODEL: "gemini-3.5-flash"
        run: |
          # Audit the PR diff against the spec and coding conventions
          jules-team review openspec/tasks.md TASK-001 --diff pr_changes.diff
