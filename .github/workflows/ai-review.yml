name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Fetch the latest jules-team CLI to perform the audit
      - name: Install jules-team CLI
        run: |
          npm install -g https://github.com/DaviDWCN/jules-team.git || echo "Warning: Could not install jules-team CLI"
        continue-on-error: true

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
          LLM_MODEL: "gemini-3.5-flash"
        run: |
          # Extract Task ID from branch name or fallback to TASK-001
          TASK_ID=$(echo "${{ github.head_ref }}" | grep -o 'TASK-[0-9]\+' || echo "TASK-001")
          echo "Reviewing task: $TASK_ID"
          # Audit the PR diff against the spec and coding conventions
          if command -v jules-team >/dev/null 2>&1; then
            jules-team review openspec/tasks.md "$TASK_ID" --diff pr_changes.diff
          else
            echo "jules-team CLI not found, skipping review agent execution."
          fi
        continue-on-error: true
