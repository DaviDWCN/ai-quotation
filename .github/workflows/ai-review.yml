name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Use a more robust way to install the jules-team CLI that avoids SSH/Git auth issues
      - name: Install jules-team CLI
        run: |
          mkdir -p jules-team-cli
          # Try to download as tarball from main or master branch
          curl -L https://github.com/DaviDWCN/jules-team/tarball/main -o jules-team.tar.gz || \
          curl -L https://github.com/DaviDWCN/jules-team/tarball/master -o jules-team.tar.gz
          tar -xzf jules-team.tar.gz -C jules-team-cli --strip-components=1
          cd jules-team-cli && npm install && npm link

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Run Review Agent
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
          LLM_MODEL: "gemini-3.5-flash"
        run: |
          # Audit the PR diff against the spec and coding conventions
          jules-team review openspec/tasks.md TASK-001 --diff pr_changes.diff
