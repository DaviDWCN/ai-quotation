name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Checkout the private jules-team repository to build the CLI
      - name: Checkout Jules Team CLI
        uses: actions/checkout@v4
        with:
          repository: 'DaviDWCN/jules-team'
          token: ${{ secrets.ORCHESTRATOR_GITHUB_TOKEN }}
          path: 'jules-team-cli'

      # Build and install the CLI locally
      - name: Install jules-team CLI
        run: |
          cd jules-team-cli
          npm install
          npm run build
          npm install -g .

      - name: Get PR Diff
        run: |
          git diff origin/main...HEAD > pr_changes.diff

      - name: Extract Task ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const prNumber = '${{ github.event.pull_request.number }}';
            const repo = '${{ github.repository }}';
            const token = process.env.GH_TOKEN;
            
            async function getTaskId() {
              try {
                // 1. Try branch name or PR title first
                const branchAndTitle = '${{ github.event.pull_request.head.ref }} ${{ github.event.pull_request.title }}';
                const match = branchAndTitle.match(/TASK-[0-9]{3,}/i);
                if (match) {
                  console.log(match[0].toUpperCase());
                  return;
                }

                // 2. Fetch timeline to find linked issue
                const headers = { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
                if (token) headers['Authorization'] = 'Bearer ' + token;
                
                const res = await fetch('https://api.github.com/repos/' + repo + '/issues/' + prNumber + '/timeline', { headers });
                if (res.ok) {
                  const events = await res.json();
                  for (const event of events) {
                    if (event.event === 'cross-referenced' && event.source?.issue) {
                      const titleMatch = event.source.issue.title.match(/TASK-[0-9]{3,}/i);
                      if (titleMatch) {
                        console.log(titleMatch[0].toUpperCase());
                        return;
                      }
                    }
                  }
                }
              } catch (e) {
                console.error(e);
              }
              // If not found, exit with error
              process.exit(1);
            }
            getTaskId();
          " > task_id.txt
          TASK_ID=$(cat task_id.txt)
          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV
          echo "Extracted Task ID: $TASK_ID"

      - name: Run Review Agent and Comment Feedback
        env:
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta/openai"
          LLM_MODEL: "gemini-3.5-flash"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Auditing task: $TASK_ID"

          # 1. Audit the PR diff against the spec and coding conventions
          exit_code=0
          jules-team review openspec/tasks.md "$TASK_ID" --diff pr_changes.diff > review_report.md 2>&1 || exit_code=$?
          cat review_report.md

          # 2. Post review comment back to the PR
          if [ -s review_report.md ]; then
            gh pr comment "${{ github.event.pull_request.html_url }}" --body-file review_report.md
          fi

          # 3. Exit with the review's original verdict status (0 = approve, 1 = request changes)
          exit $exit_code
