name: Auto-merge Jules PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for PRs where the head branch name contains 'TASK-' or starts with 'jules/'
    if: |
      contains(github.event.pull_request.head.ref, 'TASK-') ||
      startsWith(github.event.pull_request.head.ref, 'jules/')
    steps:
      - name: Enable Auto-Merge
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
