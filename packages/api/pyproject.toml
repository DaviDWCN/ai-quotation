[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "api"
version = "0.1.0"
description = "FastAPI Backend for AI Quotation System"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.1",
    "pydantic>=2.7.4",
    "pydantic-settings>=2.3.4",
    "sqlalchemy>=2.0.31",
    "alembic>=1.13.1",
    "asyncpg>=0.29.0",
    "aiosqlite>=0.20.0",
    "rapidfuzz>=3.9.3",
    "aio-pika>=9.4.2",
    "xmltodict>=0.13.0",
    "pypdf>=4.2.0",
    "openpyxl>=3.1.2",
    "python-docx>=1.1.2",
    "boto3>=1.34.0",
    "structlog>=24.2.0",
    "litellm>=1.40.0",
    "pandas>=2.2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.2",
    "pytest-asyncio>=0.23.7",
    "pytest-cov>=5.0.0",
    "mypy>=1.10.0",
    "httpx>=0.27.0",
    "types-xmltodict",
    "types-openpyxl",
    "pandas-stubs",
    "boto3-stubs[s3]",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]
